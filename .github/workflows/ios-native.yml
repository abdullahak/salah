name: iOS Native

on:
  push:
    branches:
      - main
      - "codex/**"
    paths:
      - ".github/workflows/ios-native.yml"
      - "ios/**"
      - "shared/fixtures/**"
  pull_request:
    paths:
      - ".github/workflows/ios-native.yml"
      - "ios/**"
      - "shared/fixtures/**"
  workflow_dispatch:

jobs:
  test:
    name: Xcode tests
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Create requested simulator
        run: |
          set -euo pipefail
          runtime="$(xcrun simctl list runtimes available --json | ruby -rjson -e 'runtimes = JSON.parse(STDIN.read).fetch("runtimes").select { |runtime| runtime.fetch("platform") == "iOS" && runtime.fetch("isAvailable") }; abort "No available iOS simulator runtime" if runtimes.empty?; puts runtimes.max_by { |runtime| Gem::Version.new(runtime.fetch("version")) }.fetch("identifier")')"
          device_type="$(xcrun simctl list devicetypes --json | ruby -rjson -e 'device = JSON.parse(STDIN.read).fetch("devicetypes").find { |candidate| candidate.fetch("name") == "iPhone 15" }; abort "iPhone 15 simulator device type is unavailable" unless device; puts device.fetch("identifier")')"
          xcrun simctl create "iPhone 15" "$device_type" "$runtime"

      - name: Run simulator tests
        run: xcodebuild -project ios/Salah.xcodeproj -scheme Salah -destination 'platform=iOS Simulator,name=iPhone 15' -resultBundlePath TestResults.xcresult test

      - name: Print XCTest failures
        if: failure()
        run: |
          if [ -d TestResults.xcresult ]; then
            xcrun xcresulttool get test-results summary --path TestResults.xcresult --compact || true
            xcrun xcresulttool get test-results tests --path TestResults.xcresult --compact || true
          fi
